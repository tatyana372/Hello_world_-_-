services:
  db:
    image: postgres:15
    container_name: postgres_student
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: postgres_task
      POSTGRES_PASSWORD: student
      POSTGRES_DB: student
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  db_data: